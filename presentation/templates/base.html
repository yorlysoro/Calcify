<!doctype html>
<html lang="{{ current_locale }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Calcify{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    {% block extra_css %}{% endblock %}
  </head>
  <body class="{% block body_class %}bg-zinc-950 text-gray-100 font-sans antialiased selection:bg-emerald-500/30 selection:text-emerald-200{% endblock %}">
    {% block content %}{% endblock %}
    {% block locale_data %}
    <script>var _t = {{ js_translations | tojson | safe }};</script>
    {% endblock %}
    {% block scripts %}{% endblock %}
  </body>
</html>
